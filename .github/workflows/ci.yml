name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    # Testcontainers manages its own PostgreSQL container at runtime.
    # No separate postgres service needed — Docker is available on ubuntu-latest runners.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: routineflow-api
        env:
          # Testcontainers will override these for integration tests,
          # but the values below are used as defaults in application.yml.
          DB_URL: jdbc:postgresql://localhost:5432/routineflow_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key-min-256-bits-long-enough-for-hmac-sha256
          JWT_EXPIRATION: 86400000
        run: ./mvnw test -B --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: routineflow-api/target/surefire-reports/

  # ── Frontend Build ────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: routineflow-web/package-lock.json

      - name: Install dependencies
        working-directory: routineflow-web
        run: npm ci

      - name: TypeScript check
        working-directory: routineflow-web
        run: npx tsc --noEmit

      - name: Build
        working-directory: routineflow-web
        env:
          VITE_API_URL: https://routineflow-production.up.railway.app/api
        run: npm run build

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (OWASP)
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        working-directory: routineflow-api
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=owasp-suppressions.xml \
            --no-transfer-progress || true
          # || true: do not block pipeline on false positives.
          # Remove when suppressions are configured and the report is stable.

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: routineflow-api/target/dependency-check-report.html
