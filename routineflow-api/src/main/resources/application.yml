spring:
  application:
    name: routineflow-api

  # Datasource — aponta para o PostgreSQL do Docker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/routineflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RoutineFlowPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate  # Flyway é o dono do schema — Hibernate só valida
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway — gerenciamento de migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# JWT — segredo e expiração via variáveis de ambiente
security:
  jwt:
    secret: ${JWT_SECRET:routineflow-dev-secret-key-min-256-bits-long-enough}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24h em milissegundos

# Actuator — apenas /health exposto, sem detalhes internos
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Logging
logging:
  level:
    com.routineflow: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
